version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: civictrack_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: civictrack
      MYSQL_USER: civic_user
      MYSQL_PASSWORD: civic_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
